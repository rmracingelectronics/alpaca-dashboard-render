databases:
  - name: alpaca-live-trading-db-v33
    plan: basic-256mb
    databaseName: alpaca_live_trading
    user: alpaca_live_trading

services:
  - type: web
    name: alpaca-momentum-dashboard-v33
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alpaca-live-trading-db-v33
          property: connectionString
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_ACCOUNT_ID
        sync: false
      - key: ALPACA_DATA_BASE_URL
        value: "https://data.alpaca.markets"
      - key: ALPACA_TRADING_BASE_URL
        value: "https://paper-api.alpaca.markets/v2"
      - key: ALPACA_FEED
        value: "iex"
      - key: DASH_DEBUG
        value: "false"

  - type: worker
    name: alpaca-paper-trading-worker-v33
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python trading_worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alpaca-live-trading-db-v33
          property: connectionString
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_ACCOUNT_ID
        sync: false
      - key: ALPACA_DATA_BASE_URL
        value: "https://data.alpaca.markets"
      - key: ALPACA_TRADING_BASE_URL
        value: "https://paper-api.alpaca.markets/v2"
      - key: ALPACA_FEED
        value: "iex"
      - key: PAPER_TRADING_ENABLED
        value: "true"
      - key: PAPER_TRADING_DRY_RUN
        value: "false"
      - key: ALLOW_LIVE_TRADING
        value: "false"
      - key: LIVE_WATCHLIST_PRESET
        value: "v25_playbook"
      - key: LIVE_SYMBOLS
        value: ""
      - key: LIVE_LOOKBACK_DAYS
        value: "75"
      - key: LIVE_INCREMENTAL_FETCH_DAYS
        value: "3"
      - key: LIVE_POLL_SECONDS
        value: "60"
      - key: LIVE_REQUIRE_MARKET_OPEN
        value: "true"
      - key: LIVE_ENABLE_MAX_HOLD_EXIT
        value: "true"
      - key: LIVE_SELECTION_MODE
        value: "seen_so_far_top_n"
      - key: LIVE_USE_NEWS_PROXY
        value: "true"
      - key: LIVE_MAX_DAILY_TRADES
        value: "2"
      - key: LIVE_MAX_OPEN_POSITIONS
        value: "2"
      - key: LIVE_MAX_ORDERS_PER_SYMBOL_PER_DAY
        value: "1"
      - key: LIVE_MAX_DAILY_LOSS_DOLLARS
        value: "500"
      - key: LIVE_RISK_MODE
        value: "fixed_dollar_risk"
      - key: LIVE_FIXED_RISK_DOLLARS
        value: "100"
      - key: LIVE_ACCOUNT_VALUE_FALLBACK
        value: "10000"
      - key: LIVE_BASE_RISK_PCT
        value: "1.0"
      - key: LIVE_MIN_RISK_DOLLARS
        value: "10"
      - key: LIVE_MAX_RISK_DOLLARS
        value: "100"
      - key: LIVE_DD1_RISK_PCT
        value: "0.75"
      - key: LIVE_DD2_RISK_PCT
        value: "0.50"
      - key: LIVE_PAUSE_DD_PCT
        value: "15"
      - key: LIVE_ALLOW_FRACTIONAL_SHARES
        value: "false"
